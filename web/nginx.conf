server {
    listen 8080;
    server_name _;
    root /app;

    # Gzip 压缩静态资源，减少传输体积，提升并发吞吐
    gzip on;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript font/woff2;
    gzip_vary on;
    gzip_comp_level 6;

    # 带版本号的静态资源（index.html 里 ?v=xxx 就是版本号）
    # 可以长期缓存；换新版本时 HTML 中的 ?v= 参数会变化，自动拉新文件
    location ~* \.(css|js|ico|svg|woff2?|ttf|eot|png|jpg|jpeg|gif)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # 入口页面（index.html / home.html）始终拉最新，杜绝"换版本后用户看到旧页面"
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # 运行时注入的前端配置，不缓存（容器启动时根据 config.toml 重写）
    location = /config.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # 根路径与未知路径统一回退到 /index.html（内部 rewrite，不做 HTTP 302）。
    # 过去这里用 `return 302 /index.html;`，nginx 会按 $scheme://$host:$server_port
    # 拼成绝对 Location，把容器侧 `listen 8080` 泄漏到 Location 头，叠加
    # 宿主 HSTS 后浏览器会被升级到 https://host:8080/index.html 而访问不通。
    location / {
        try_files $uri /index.html;
    }
}
