<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · Template</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="css/style.css?v=dev">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-card">
        <h1 class="auth-title" id="authBrand">Template</h1>
        <p class="auth-subtitle" id="authSubtitle">登录你的账号</p>

        <form id="authForm" class="auth-form" autocomplete="off">
            <label class="auth-field">
                <span>用户名</span>
                <input type="text" id="nameInput" maxlength="32" required placeholder="请输入用户名">
            </label>
            <label class="auth-field">
                <span>密码</span>
                <input type="password" id="passwordInput" required placeholder="请输入密码">
            </label>
            <button type="submit" class="auth-btn" id="submitBtn">登录</button>
            <p class="auth-hint" id="authHint"></p>
            <div class="auth-switch">
                <span id="switchLabel">还没有账号？</span>
                <a href="javascript:void(0)" id="switchLink">去注册</a>
            </div>
        </form>
    </div>
</div>

<script src="js/utils.js?v=dev"></script>
<script src="js/api.js?v=dev"></script>
<script src="js/rum.js?v=dev"></script>
<script src="js/auth.js?v=dev"></script>
</body>
</html>
