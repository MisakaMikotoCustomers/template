# ============================================================
# Template API Server 配置示例
# ------------------------------------------------------------
# 启动时读取优先级：
#   1) 环境变量 APP_CONFIG_PATH 指定的路径
#   2) 默认路径 /config/config.toml
# ============================================================

[server]
# 监听地址："0.0.0.0" 允许外部访问，"127.0.0.1" 仅本机
host = "0.0.0.0"
# 监听端口
port = 8080
# URL 前缀，默认不加；例如 "/v1"
url_prefix = ""
# uvicorn worker 进程数。I/O 密集型建议 1；CPU 密集可按核数调大
workers = 1
# 日志级别：debug/info/warning/error
log_level = "info"

[database]
# 数据库类型（目前仅支持 mysql）
type = "mysql"
# 数据库地址
url = "127.0.0.1"
# 数据库端口
port = 3306
# 用户名
username = "root"
# 密码
password = ""
# 库名（启动时如不存在会自动建表；库本身需预先存在）
database = "template"
# 异步连接池大小
pool_size = 20
# 允许超出 pool_size 后额外创建的连接数
max_overflow = 10
# 连接回收时间（秒）
pool_recycle = 3600
# 是否打印 SQL（调试用）
echo = true

[auth]
# 登录会话（token）有效期（天）
session_expire_days = 7

# 特殊账号（平台保留 + 内置管理员）：
# - 这里的 name 会自动成为注册黑名单（大小写不敏感，完全匹配），
#   普通用户无法注册与之重名的账号（admin 走这个机制保留）。
# - 应用每次启动会按 name 对齐 user 表：存在则更新 password_hash（明文 SHA-256），
#   不存在则新建。password 存在这里请填明文，库里只存哈希值。
# - 至少需要保留 name = "admin" 的条目，否则 /api/admin/* 将无可用账号。
[[auth.special_accounts]]
name = "admin"
password = "changeme"

# ============================================================
# 日志（腾讯云 CLS）
# ------------------------------------------------------------
# 本段等同于 `[log]`，ai-task 在部署时会自动注入 `[log]` 段覆盖这些字段
# （见 ai-task 的 deploy TOML 生成器）。本地 dev / 未接 CLS 的部署保持
# `enabled = false` 即可，日志只会输出到 stdout（已经是 JSON 结构化）。
# ============================================================
[cls]
enabled = false
region = ""
secret_id = ""
secret_key = ""
# apiserver 自身日志的 CLS topic。由 ai-task 为每个 (deploy, env) 分配。
topic_id = ""
# 写入 CLS 每条日志的 service / env 字段，便于在 CLS 里按来源过滤
service = "apiserver"
env = "default"
# 远程上报失败时的本地降级文件（按大小轮转）
fallback_path = "/tmp/cls_fallback.jsonl"
fallback_max_mb = 200

# ============================================================
# SQL 耗时拦截器（SQLAlchemy event 钩子）
# ------------------------------------------------------------
# 启用后每条 SQL 都会以 INFO 级别打印（含耗时、行数、参数预览）；
# 超过 slow_threshold_ms 的单独标记 event=mysql.slow 便于聚合告警。
# 默认关闭，真正需要排查性能时再打开。
# ============================================================
[sql_interceptor]
enabled = false
slow_threshold_ms = 200
max_sql_bytes = 2048
log_params = true
max_params_bytes = 1024
