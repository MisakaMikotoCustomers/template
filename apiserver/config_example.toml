# ============================================================
# Template API Server 配置示例
# ------------------------------------------------------------
# 启动时读取优先级：
#   1) 环境变量 APP_CONFIG_PATH 指定的路径
#   2) 默认路径 /config/config.toml
# ============================================================

[server]
# 监听地址："0.0.0.0" 允许外部访问，"127.0.0.1" 仅本机
host = "0.0.0.0"
# 监听端口
port = 8080
# URL 前缀，默认不加；例如 "/v1"
url_prefix = ""
# uvicorn worker 进程数。I/O 密集型建议 1；CPU 密集可按核数调大
workers = 1
# 日志级别：debug/info/warning/error
log_level = "info"

[database]
# 数据库类型（目前仅支持 mysql）
type = "mysql"
# 数据库地址
url = "127.0.0.1"
# 数据库端口
port = 3306
# 用户名
username = "root"
# 密码
password = ""
# 库名（启动时如不存在会自动建表；库本身需预先存在）
database = "template"
# 异步连接池大小
pool_size = 20
# 允许超出 pool_size 后额外创建的连接数
max_overflow = 10
# 连接回收时间（秒）
pool_recycle = 3600
# 是否打印 SQL（调试用）
echo = true

[auth]
# 登录会话（token）有效期（天）
session_expire_days = 7

# 特殊账号（平台保留 + 内置管理员）：
# - 这里的 name 会自动成为注册黑名单（大小写不敏感，完全匹配），
#   普通用户无法注册与之重名的账号（admin 走这个机制保留）。
# - 应用每次启动会按 name 对齐 user 表：存在则更新 password_hash（明文 SHA-256），
#   不存在则新建。password 存在这里请填明文，库里只存哈希值。
# - 至少需要保留 name = "admin" 的条目，否则 /api/admin/* 将无可用账号。
[[auth.special_accounts]]
name = "admin"
password = "changeme"

[apm]
# 腾讯云 APM（应用性能监控）。通常由 ai_task 平台在部署时通过官方配置下发，
# 无需手动填写；本段提供字段文档供参考。enabled=false 时完全零开销。
enabled = false
# OTLP 接入点（gRPC 4317 / HTTP 4318）。形如 {region}.apm.tencentcs.com:4317
endpoint = "ap-guangzhou.apm.tencentcs.com:4317"
# APM 实例 Token（控制台 -> 应用列表 -> 接入应用 获取）
token = ""
# 服务名：展示在腾讯云 APM "应用列表"
service_name = "template-apiserver"
# 环境标识（test/prod），写入 deployment.environment 属性
env = "prod"
# 采样率 0~1，高 QPS 服务可降至 0.1~0.3
sampler_ratio = 1.0
# 上报协议：grpc / http
protocol = "grpc"
# 自动埋点开关（FastAPI + SQLAlchemy + httpx）
instrument_fastapi = true
instrument_sqlalchemy = true
instrument_httpx = true
