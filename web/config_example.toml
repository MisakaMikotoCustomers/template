# ============================================================
# Template Web 前端配置示例
# ------------------------------------------------------------
# 启动时读取优先级：
#   1) 环境变量 APP_CONFIG_PATH 指定的路径
#   2) 默认路径 /config/config.toml
#
# 本配置供 entrypoint.sh 运行时生成 /app/config.json，
# 前端 api.js 会从 /config.json 读取后端地址与展示名称。
# ============================================================

[server]
# 监听地址 & 端口（供 nginx 使用；当前模板默认写死 8080）
host = "0.0.0.0"
port = 8080
# 网页前端项目展示名称（页面标题、侧边栏品牌等处使用）
name = "Template"

[apiserver]
# 后端 API 主机地址（协议+域名/IP+端口）。
# 留空即表示后端与前端同域，由 nginx/反代把 /api 前缀转给 apiserver。
host = ""
# 后端 API 路径前缀（需和 apiserver 的 server.url_prefix + "/api" 对齐）
path_prefix = "/api"

# ============================================================
# [rum] 腾讯云 RUM（Aegis）前端监控配置
# ------------------------------------------------------------
# enabled=false 时完全不加载 Aegis SDK；
# 正式接入请先在「admin 后台 → 资源管理」配置 frontend_monitor 资源，
# 然后在「应用创建」时默认会按 (应用, 环境) 各建一个独立的 RUM 项目，
# 并把 aegis_id 写回到本配置的 [rum].id。
# ------------------------------------------------------------
# 字段与官方 Aegis 构造参数对齐（snake_case <-> camelCase）：
#   id                -> id               (腾讯云 RUM 项目 aegis id)
#   uin               -> uin              (可选，用户标识)
#   host_url          -> hostUrl          (上报地址)
#   spa               -> spa              (单页应用路由监听)
#   report_api_speed  -> reportApiSpeed
#   report_asset_speed-> reportAssetSpeed
#   env               -> env              (test/prod 等环境标签)
#   version           -> version          (发布版本，留空退化为 BUILD_VERSION)
#   sample_rate       -> sampleRate       (0-1 浮点采样率)
#   src                                    (Aegis SDK CDN 地址)
# ============================================================
[rum]
enabled = false
id = ""
uin = ""
host_url = "https://rumt-zh.com"
spa = true
report_api_speed = true
report_asset_speed = true
env = ""
# 留空时自动使用镜像构建时注入的 BUILD_VERSION（8 位 git commit）。
version = ""
sample_rate = 1.0
src = "https://tam.cdn-go.cn/aegis-sdk/latest/aegis.min.js"
